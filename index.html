<!doctype html>
<title>oscd-network-config Demo</title>
<link
  rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300&family=Roboto:wght@300;400;500&display=swap"
/>
<link
  rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600&display=swap"
/>
<link
  rel="stylesheet"
  href="https://fonts.googleapis.com/css?family=Material+Icons&display=block"
/>
<link
  href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
  rel="stylesheet"
/>
<link rel="stylesheet" href="./demo/sysconex-theme/colors.css" />
<link rel="stylesheet" href="./demo/sysconex-theme/theming.css" />
<oscd-shell></oscd-shell>

<script type="module">
  import './demo/shell.deploy.js';
  import { plugins } from './demo/plugins.deploy.js';

  const editor = document.querySelector('oscd-shell');
  editor.plugins = plugins;
  editor.dispatchEvent(new CustomEvent('plugins-updated'));

  const params = new URL(document.location).searchParams;
  for (const [name, value] of params) {
    editor.setAttribute(name, value);
  }
</script>
<style>
  * {
    margin: 0px;
    padding: 0px;
    --mdc-icon-font: 'Material Symbols Outlined';
  }

  html,
  body {
    height: 100%;
    width: 100%;
  }

  oscd-shell {
    display: block;
    height: 100vh;
    width: 100%;
  }

  body {
    background: white;
  }
</style>
